
services:
 
  # ── Bun API server ──────────────────────────────────────────────────────────
  server:
    build:
      context: .                      # repo root — turbo prune needs the full tree
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    
  # ── React SPA + Caddy reverse proxy ─────────────────────────────────────────
  client:
    build:
      context: .                      # repo root — same reason as above
      dockerfile: packages/client/Dockerfile
    restart: unless-stopped
    ports:
      - "${WORDLINE_PORT:-8080}:80"
    depends_on:
      - server
